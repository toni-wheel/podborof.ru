<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Помощь при покупке авто</title>
  </head>
  <body>
    <header class="header">
      <div class="header__top">
        <div class="container header__top-container">
          <nav class="header__nav">
            <ul class="header__menu">
              <li><a href="#fraud">Обман продавцов</a></li>
              <li><a href="#risks">Риски для вас</a></li>
              <li><a href="#process">Как подбираем</a></li>
              <li><a href="#check">Осмотр авто</a></li>
              <li><a href="#price">Цены</a></li>
              <li><a href="#reviews">Отзывы</a></li>
            </ul>
          </nav>
        </div>
      </div>

      <div class="header__bottom">
        <div class="container header__bottom-container">
          <div class="header__logo">
            <img src="./assets/images/logo.png" alt="Логотип компании" />
            <div class="company-info">
              <span class="company-name">Podborof</span>
              <span class="company-slogan">Помощь при покупке авто</span>
            </div>
          </div>
          <div class="header__contacts">
            <div class="header__address">
              <div class="header__address-icon">
                <img
                  src="./images/svg/location.svg"
                  alt="Адрес"
                  class="icon icon-address"
                />
              </div>
              <div class="header__address-text">
                <span>г. Москва, ул. Ленинская 0, дом 0, корп. 0, офис 0</span>
              </div>
            </div>
            <div class="header__phone">
              <div class="header__phone-icon">
                <img
                  src="./images/svg/phone.svg"
                  alt="Телефон"
                  class="icon icon-phone"
                />
              </div>
              <div class="header__phone-text">
                <span>Ежедневно с 10:00 по 18:00</span>
                <a href="tel:+70001234567">7 000 123-45-67</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="promo">
        <div class="container"></div>
      </div>
    </main>
    <footer class="footer"><div class="container"></div></footer>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
